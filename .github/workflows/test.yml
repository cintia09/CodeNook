name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify install script (dry run)
        run: bash install.sh --dry-run

      - name: Verify skills-v4 structure
        run: |
          # Check required files exist
          test -f skills-v4/codenook-init/SKILL.md
          test -f skills-v4/codenook-engine/SKILL.md
          test -f skills-v4/codenook-init/templates/acceptor.agent.md
          test -f skills-v4/codenook-init/templates/designer.agent.md
          test -f skills-v4/codenook-init/templates/implementer.agent.md
          test -f skills-v4/codenook-init/templates/reviewer.agent.md
          test -f skills-v4/codenook-init/templates/tester.agent.md
          echo "✅ All skill files present"

      - name: Verify HITL adapters
        run: |
          for f in skills-v4/codenook-engine/hitl-adapters/*.sh; do
            bash -n "$f" && echo "✅ $f syntax OK"
          done
          echo "✅ All adapters valid"

      - name: Verify VERSION
        run: |
          VERSION=$(cat VERSION)
          echo "Version: $VERSION"
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] && echo "✅ Valid semver"
