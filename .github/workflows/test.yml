name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Make hooks executable
        run: chmod +x hooks/*.sh

      - name: Run all tests
        run: bash tests/run-all.sh

      - name: Verify install script (dry run)
        run: bash install.sh --check 2>/dev/null || true
