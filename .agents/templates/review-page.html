<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HITL Review: {{TASK_ID}} — {{ROLE}}</title>
<style>
  :root { --bg: #1a1a2e; --card: #16213e; --accent: #0f3460; --text: #e4e4e4; --green: #4caf50; --yellow: #ff9800; --red: #f44336; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 2rem; line-height: 1.6; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 2px solid var(--accent); }
  .header h1 { font-size: 1.5rem; }
  .badge { padding: 0.3rem 0.8rem; border-radius: 4px; font-size: 0.85rem; font-weight: 600; }
  .badge-pending { background: var(--yellow); color: #000; }
  .badge-approved { background: var(--green); color: #fff; }
  .content { background: var(--card); padding: 2rem; border-radius: 8px; margin-bottom: 2rem; }
  .content h2, .content h3 { color: #7ec8e3; margin: 1rem 0 0.5rem; }
  .content table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
  .content th, .content td { padding: 0.5rem; border: 1px solid var(--accent); text-align: left; }
  .content th { background: var(--accent); }
  .content code { background: rgba(255,255,255,0.1); padding: 0.2rem 0.4rem; border-radius: 3px; }
  .content pre { background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 4px; overflow-x: auto; }
  .feedback-section { background: var(--card); padding: 2rem; border-radius: 8px; margin-bottom: 2rem; }
  .feedback-section h2 { color: #7ec8e3; margin-bottom: 1rem; }
  textarea { width: 100%; min-height: 120px; background: rgba(0,0,0,0.3); color: var(--text); border: 1px solid var(--accent); border-radius: 4px; padding: 0.8rem; font-family: inherit; font-size: 0.95rem; resize: vertical; }
  .actions { display: flex; gap: 1rem; margin-top: 1.5rem; }
  button { padding: 0.8rem 2rem; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }
  button:hover { opacity: 0.85; }
  .btn-approve { background: var(--green); color: #fff; }
  .btn-feedback { background: var(--yellow); color: #000; }
  .btn-reject { background: var(--red); color: #fff; }
  .history { margin-top: 2rem; }
  .history-item { background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 4px; margin-bottom: 0.5rem; border-left: 3px solid var(--yellow); }
  .result-msg { padding: 1rem; border-radius: 4px; margin-top: 1rem; font-weight: 600; display: none; }
  .result-msg.show { display: block; }
  .result-msg.success { background: rgba(76,175,80,0.2); border: 1px solid var(--green); }
  .result-msg.feedback-sent { background: rgba(255,152,0,0.2); border: 1px solid var(--yellow); }
</style>
</head>
<body>

<div class="header">
  <h1>🚪 HITL Review: {{TASK_ID}} — {{ROLE_EMOJI}} {{ROLE}}</h1>
  <span class="badge badge-pending" id="statusBadge">⏳ Pending Review</span>
</div>

<div class="content" id="docContent">
  {{CONTENT}}
</div>

<div class="feedback-section">
  <h2>💬 Feedback</h2>
  <textarea id="feedbackInput" placeholder="Enter your feedback here... (optional for approval, required for requesting changes)"></textarea>
  
  <div class="actions">
    <button class="btn-approve" onclick="submitDecision('approved')">✅ Approve</button>
    <button class="btn-feedback" onclick="submitDecision('feedback')">💬 Request Changes</button>
  </div>

  <div class="result-msg success" id="approvedMsg">✅ Approved! Agent can proceed with FSM transition.</div>
  <div class="result-msg feedback-sent" id="feedbackMsg">💬 Feedback submitted. Agent will modify and re-publish.</div>
</div>

<div class="history" id="feedbackHistory">
  <h2>📋 Feedback History</h2>
</div>

<script>
  const TASK_ID = '{{TASK_ID}}';
  const ROLE = '{{ROLE}}';
  const FEEDBACK_FILE = '{{FEEDBACK_PATH}}';

  function submitDecision(decision) {
    const feedback = document.getElementById('feedbackInput').value.trim();
    
    if (decision === 'feedback' && !feedback) {
      alert('Please provide feedback when requesting changes.');
      return;
    }

    const data = {
      task_id: TASK_ID,
      role: ROLE,
      decision: decision,
      feedback: feedback || null,
      at: new Date().toISOString(),
      by: 'human'
    };

    // Write to feedback file via download (browser security prevents direct file write)
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = TASK_ID + '-' + ROLE + '-feedback.json';
    a.click();
    URL.revokeObjectURL(url);

    // Update UI
    if (decision === 'approved') {
      document.getElementById('statusBadge').className = 'badge badge-approved';
      document.getElementById('statusBadge').textContent = '✅ Approved';
      document.getElementById('approvedMsg').classList.add('show');
    } else {
      document.getElementById('feedbackMsg').classList.add('show');
    }

    // Add to history
    const historyDiv = document.getElementById('feedbackHistory');
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = '<strong>' + decision.toUpperCase() + '</strong> — ' + data.at + (feedback ? '<br>' + feedback : '');
    historyDiv.appendChild(item);

    document.getElementById('feedbackInput').value = '';
  }
</script>

</body>
</html>
