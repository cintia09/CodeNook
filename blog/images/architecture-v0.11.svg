<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1160" font-family="Helvetica Neue, Arial, sans-serif">
  <defs>
    <style>
      .layer-label { font-size: 13px; fill: #64748b; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
      .container-label { font-size: 17px; fill: #0f172a; font-weight: 700; }
      .box-title { font-size: 15px; fill: #0f172a; font-weight: 600; }
      .box-sub { font-size: 11px; fill: #475569; }
      .tile-title { font-size: 13px; fill: #0f172a; font-weight: 600; }
      .tile-sub { font-size: 10px; fill: #64748b; }
      .note { font-size: 11px; fill: #64748b; font-style: italic; }
      .arrow-label { font-size: 11px; fill: #334155; font-weight: 500; }
      .title { font-size: 20px; fill: #0f172a; font-weight: 700; }
      .subtitle { font-size: 12px; fill: #64748b; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" class="title">CodeNook v0.11 — System Architecture</text>
  <text x="600" y="56" text-anchor="middle" class="subtitle">Kernel · Plugins · Per-workspace runtime</text>

  <!-- Layer 1: User -->
  <text x="60" y="100" class="layer-label">1 · User</text>
  <rect x="440" y="80" width="320" height="60" rx="4" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="600" y="106" text-anchor="middle" class="box-title">User · Claude Code session</text>
  <text x="600" y="124" text-anchor="middle" class="box-sub">natural-language turn → main session orchestrator</text>

  <!-- Arrow 1→2 -->
  <line x1="600" y1="140" x2="600" y2="180" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 2: Router Agent -->
  <text x="60" y="200" class="layer-label">2 · Router agent</text>
  <rect x="160" y="180" width="880" height="90" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="600" y="204" text-anchor="middle" class="container-label">Router agent — per-turn orchestrator</text>

  <rect x="190" y="218" width="190" height="40" rx="4" fill="#ffffff" stroke="#d97706" stroke-width="1"/>
  <text x="285" y="236" text-anchor="middle" class="tile-title">classify turn</text>
  <text x="285" y="250" text-anchor="middle" class="tile-sub">chat vs task candidate</text>

  <rect x="400" y="218" width="190" height="40" rx="4" fill="#ffffff" stroke="#d97706" stroke-width="1"/>
  <text x="495" y="236" text-anchor="middle" class="tile-title">render-prompt</text>
  <text x="495" y="250" text-anchor="middle" class="tile-sub">draft-config → confirm</text>

  <rect x="610" y="218" width="190" height="40" rx="4" fill="#ffffff" stroke="#d97706" stroke-width="1"/>
  <text x="705" y="236" text-anchor="middle" class="tile-title">spawn</text>
  <text x="705" y="250" text-anchor="middle" class="tile-sub">materialise .codenook/tasks/&lt;id&gt;</text>

  <rect x="820" y="218" width="190" height="40" rx="4" fill="#ffffff" stroke="#d97706" stroke-width="1"/>
  <text x="915" y="236" text-anchor="middle" class="tile-title">dispatch</text>
  <text x="915" y="250" text-anchor="middle" class="tile-sub">phase → role → subagent</text>

  <!-- Arrow 2→3 -->
  <line x1="600" y1="270" x2="600" y2="310" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="610" y="294" class="arrow-label">invoke</text>

  <!-- Layer 3: Kernel -->
  <text x="60" y="330" class="layer-label">3 · Kernel</text>
  <rect x="80" y="310" width="1040" height="240" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="600" y="334" text-anchor="middle" class="container-label">skills/codenook-core — builtin skills &amp; _lib/</text>

  <!-- Kernel tiles: 4 cols x 3 rows = 12 tiles -->
  <!-- Row 1 -->
  <rect x="110" y="352" width="230" height="56" rx="4" fill="#ffffff" stroke="#059669" stroke-width="1"/>
  <text x="225" y="374" text-anchor="middle" class="tile-title">router-agent</text>
  <text x="225" y="390" text-anchor="middle" class="tile-sub">conversational entry point</text>
  <text x="225" y="402" text-anchor="middle" class="tile-sub">(M8) render · confirm · spawn</text>

  <rect x="350" y="352" width="230" height="56" rx="4" fill="#ffffff" stroke="#059669" stroke-width="1"/>
  <text x="465" y="374" text-anchor="middle" class="tile-title">orchestrator-tick</text>
  <text x="465" y="390" text-anchor="middle" class="tile-sub">phase advancement loop</text>
  <text x="465" y="402" text-anchor="middle" class="tile-sub">verdict · HITL · distiller gate</text>

  <rect x="590" y="352" width="230" height="56" rx="4" fill="#ffffff" stroke="#059669" stroke-width="1"/>
  <text x="705" y="374" text-anchor="middle" class="tile-title">spawn</text>
  <text x="705" y="390" text-anchor="middle" class="tile-sub">task state bootstrap</text>
  <text x="705" y="402" text-anchor="middle" class="tile-sub">slot resolution · lock · audit</text>

  <rect x="830" y="352" width="230" height="56" rx="4" fill="#ffffff" stroke="#059669" stroke-width="1"/>
  <text x="945" y="374" text-anchor="middle" class="tile-title">dispatch_subagent</text>
  <text x="945" y="390" text-anchor="middle" class="tile-sub">Task-tool invocation</text>
  <text x="945" y="402" text-anchor="middle" class="tile-sub">sandboxed role execution</text>

  <!-- Row 2 -->
  <rect x="110" y="418" width="230" height="56" rx="4" fill="#ffffff" stroke="#059669" stroke-width="1"/>
  <text x="225" y="440" text-anchor="middle" class="tile-title">distiller</text>
  <text x="225" y="456" text-anchor="middle" class="tile-sub">verdict extraction</text>
  <text x="225" y="468" text-anchor="middle" class="tile-sub">phase summary → memory</text>

  <rect x="350" y="418" width="230" height="56" rx="4" fill="#ffffff" stroke="#059669" stroke-width="1"/>
  <text x="465" y="440" text-anchor="middle" class="tile-title">task_chain</text>
  <text x="465" y="456" text-anchor="middle" class="tile-sub">parent-child linking (M10)</text>
  <text x="465" y="468" text-anchor="middle" class="tile-sub">two-pass LLM compression</text>

  <rect x="590" y="418" width="230" height="56" rx="4" fill="#ffffff" stroke="#059669" stroke-width="1"/>
  <text x="705" y="440" text-anchor="middle" class="tile-title">parent_suggester</text>
  <text x="705" y="456" text-anchor="middle" class="tile-sub">Jaccard top-3 candidates</text>
  <text x="705" y="468" text-anchor="middle" class="tile-sub">chain-root resolution</text>

  <rect x="830" y="418" width="230" height="56" rx="4" fill="#ffffff" stroke="#059669" stroke-width="1"/>
  <text x="945" y="440" text-anchor="middle" class="tile-title">memory_layer</text>
  <text x="945" y="456" text-anchor="middle" class="tile-sub">patch-or-create writes (M9)</text>
  <text x="945" y="468" text-anchor="middle" class="tile-sub">knowledge · skills · config</text>

  <!-- Row 3 -->
  <rect x="110" y="484" width="230" height="56" rx="4" fill="#ffffff" stroke="#059669" stroke-width="1"/>
  <text x="225" y="506" text-anchor="middle" class="tile-title">memory_index</text>
  <text x="225" y="522" text-anchor="middle" class="tile-sub">water-mark (80%) scan</text>
  <text x="225" y="534" text-anchor="middle" class="tile-sub">distiller promotion queue</text>

  <rect x="350" y="484" width="230" height="56" rx="4" fill="#ffffff" stroke="#059669" stroke-width="1"/>
  <text x="465" y="506" text-anchor="middle" class="tile-title">claude_md_linter</text>
  <text x="465" y="522" text-anchor="middle" class="tile-sub">forbidden-domain tokens</text>
  <text x="465" y="534" text-anchor="middle" class="tile-sub">task-lifecycle §1–§8 check</text>

  <rect x="590" y="484" width="230" height="56" rx="4" fill="#ffffff" stroke="#059669" stroke-width="1"/>
  <text x="705" y="506" text-anchor="middle" class="tile-title">plugin_readonly</text>
  <text x="705" y="522" text-anchor="middle" class="tile-sub">write-barrier enforcement</text>
  <text x="705" y="534" text-anchor="middle" class="tile-sub">plugin immutability audit</text>

  <rect x="830" y="484" width="230" height="56" rx="4" fill="#ffffff" stroke="#059669" stroke-width="1"/>
  <text x="945" y="506" text-anchor="middle" class="tile-title">secret_scan</text>
  <text x="945" y="522" text-anchor="middle" class="tile-sub">9 fail-close patterns</text>
  <text x="945" y="534" text-anchor="middle" class="tile-sub">dispatch payload redaction</text>

  <!-- Arrow 3→4 -->
  <line x1="400" y1="550" x2="400" y2="600" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="410" y="580" class="arrow-label">resolve phase/role (read-only)</text>

  <!-- Arrow 3→5 (runtime writes) -->
  <line x1="900" y1="550" x2="900" y2="790" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="910" y="620" class="arrow-label">write task/memory</text>

  <!-- Layer 4: Plugins -->
  <text x="60" y="620" class="layer-label">4 · Plugins</text>
  <rect x="80" y="600" width="760" height="180" rx="6" fill="#fce7f3" stroke="#be185d" stroke-width="1.5"/>
  <text x="460" y="624" text-anchor="middle" class="container-label">plugins/development — pipeline plugin (read-only)</text>
  <text x="460" y="642" text-anchor="middle" class="box-sub">6 phases × 7 roles · declarative routing · verdict contract</text>

  <!-- Phases row -->
  <text x="110" y="670" class="tile-title">Phases</text>
  <rect x="110" y="678" width="110" height="36" rx="3" fill="#ffffff" stroke="#be185d" stroke-width="1"/>
  <text x="165" y="700" text-anchor="middle" class="tile-sub">analyze</text>
  <rect x="230" y="678" width="110" height="36" rx="3" fill="#ffffff" stroke="#be185d" stroke-width="1"/>
  <text x="285" y="700" text-anchor="middle" class="tile-sub">design</text>
  <rect x="350" y="678" width="110" height="36" rx="3" fill="#ffffff" stroke="#be185d" stroke-width="1"/>
  <text x="405" y="700" text-anchor="middle" class="tile-sub">code</text>
  <rect x="470" y="678" width="110" height="36" rx="3" fill="#ffffff" stroke="#be185d" stroke-width="1"/>
  <text x="525" y="700" text-anchor="middle" class="tile-sub">review</text>
  <rect x="590" y="678" width="110" height="36" rx="3" fill="#ffffff" stroke="#be185d" stroke-width="1"/>
  <text x="645" y="700" text-anchor="middle" class="tile-sub">test</text>
  <rect x="710" y="678" width="110" height="36" rx="3" fill="#ffffff" stroke="#be185d" stroke-width="1"/>
  <text x="765" y="700" text-anchor="middle" class="tile-sub">integrate</text>

  <!-- Roles row -->
  <text x="110" y="738" class="tile-title">Roles (7)</text>
  <rect x="110" y="746" width="100" height="26" rx="3" fill="#ffffff" stroke="#be185d" stroke-width="1"/>
  <text x="160" y="763" text-anchor="middle" class="tile-sub">analyst</text>
  <rect x="215" y="746" width="100" height="26" rx="3" fill="#ffffff" stroke="#be185d" stroke-width="1"/>
  <text x="265" y="763" text-anchor="middle" class="tile-sub">architect</text>
  <rect x="320" y="746" width="100" height="26" rx="3" fill="#ffffff" stroke="#be185d" stroke-width="1"/>
  <text x="370" y="763" text-anchor="middle" class="tile-sub">implementer</text>
  <rect x="425" y="746" width="100" height="26" rx="3" fill="#ffffff" stroke="#be185d" stroke-width="1"/>
  <text x="475" y="763" text-anchor="middle" class="tile-sub">reviewer</text>
  <rect x="530" y="746" width="100" height="26" rx="3" fill="#ffffff" stroke="#be185d" stroke-width="1"/>
  <text x="580" y="763" text-anchor="middle" class="tile-sub">tester</text>
  <rect x="635" y="746" width="100" height="26" rx="3" fill="#ffffff" stroke="#be185d" stroke-width="1"/>
  <text x="685" y="763" text-anchor="middle" class="tile-sub">integrator</text>
  <rect x="740" y="746" width="80" height="26" rx="3" fill="#ffffff" stroke="#be185d" stroke-width="1"/>
  <text x="780" y="763" text-anchor="middle" class="tile-sub">release</text>

  <!-- Arrow 4→5 -->
  <line x1="400" y1="780" x2="400" y2="830" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="410" y="810" class="arrow-label">materialise into workspace</text>

  <!-- Layer 5: Workspace -->
  <text x="60" y="850" class="layer-label">5 · Per-workspace runtime</text>
  <rect x="80" y="830" width="1040" height="260" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="600" y="854" text-anchor="middle" class="container-label">.codenook/ — per-workspace state</text>

  <!-- 3 sub-boxes -->
  <rect x="110" y="876" width="320" height="190" rx="4" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
  <text x="270" y="898" text-anchor="middle" class="box-title">plugins/</text>
  <text x="270" y="914" text-anchor="middle" class="box-sub">installed pipeline plugins</text>
  <text x="270" y="930" text-anchor="middle" class="box-sub">(read-only — write-barrier enforced)</text>
  <line x1="130" y1="942" x2="410" y2="942" stroke="#cbd5e1" stroke-width="1"/>
  <text x="130" y="962" class="tile-sub">• phases/</text>
  <text x="130" y="980" class="tile-sub">• roles/</text>
  <text x="130" y="998" class="tile-sub">• routing.yaml</text>
  <text x="130" y="1016" class="tile-sub">• plugin.yaml (manifest)</text>
  <text x="130" y="1040" class="note">audited by plugin_readonly.py</text>

  <rect x="440" y="876" width="320" height="190" rx="4" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
  <text x="600" y="898" text-anchor="middle" class="box-title">memory/</text>
  <text x="600" y="914" text-anchor="middle" class="box-sub">persistent workspace knowledge</text>
  <text x="600" y="930" text-anchor="middle" class="box-sub">(writable — patch-first policy)</text>
  <line x1="460" y1="942" x2="740" y2="942" stroke="#cbd5e1" stroke-width="1"/>
  <text x="460" y="962" class="tile-sub">• knowledge/ (facts, decisions)</text>
  <text x="460" y="980" class="tile-sub">• skills/ (learned procedures)</text>
  <text x="460" y="998" class="tile-sub">• config/ (user preferences)</text>
  <text x="460" y="1016" class="tile-sub">• history/ (run-level audit)</text>
  <text x="460" y="1040" class="note">caps: 3 / 1 / 5 per task</text>

  <rect x="770" y="876" width="320" height="190" rx="4" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
  <text x="930" y="898" text-anchor="middle" class="box-title">tasks/&lt;id&gt;/</text>
  <text x="930" y="914" text-anchor="middle" class="box-sub">one directory per task</text>
  <text x="930" y="930" text-anchor="middle" class="box-sub">(writable — task-scoped)</text>
  <line x1="790" y1="942" x2="1070" y2="942" stroke="#cbd5e1" stroke-width="1"/>
  <text x="790" y="962" class="tile-sub">• state.json (phase, iteration)</text>
  <text x="790" y="980" class="tile-sub">• config.yaml (resolved)</text>
  <text x="790" y="998" class="tile-sub">• transcripts/ (per phase)</text>
  <text x="790" y="1016" class="tile-sub">• artifacts/ (code, diffs)</text>
  <text x="790" y="1040" class="note">parent_id · chain_root (M10)</text>

  <!-- Feedback loop: tasks → memory (extraction) -->
  <path d="M 770 1000 C 700 1000, 700 1000, 760 1000" fill="none" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arrow-dashed)"/>
  <text x="765" y="1085" text-anchor="middle" class="note">extraction ← tasks/&lt;id&gt;/ → memory/ (after-phase loop · 80% water-mark)</text>
  <path d="M 930 1066 C 930 1110, 600 1110, 600 1066" fill="none" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arrow-dashed)"/>

  <!-- Legend (bottom) -->
  <text x="80" y="1130" class="note">Colors indicate layer boundary (User · Router · Kernel · Plugins · Workspace). Solid arrows = synchronous invocation; dashed = after-phase extraction feedback.</text>
</svg>
