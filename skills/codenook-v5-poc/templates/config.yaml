# CodeNook workspace configuration (v5.0 POC)
version: "5.0-poc"

models:
  default: claude-sonnet-4.5
  clarifier: claude-sonnet-4.5
  designer: claude-sonnet-4.5
  planner: claude-sonnet-4.5
  implementer: claude-sonnet-4.5
  reviewer: claude-sonnet-4.5
  reviewer_a: claude-sonnet-4.5
  reviewer_b: claude-sonnet-4.5
  synthesizer: claude-sonnet-4.5
  tester: claude-sonnet-4.5
  acceptor: claude-sonnet-4.5
  validator: claude-haiku-4.5
  # dedicated dual_a / dual_b reserved for model-diversity experiments

orchestrator:
  max_context_ratio_warn: 0.5
  max_context_ratio_alert: 0.8
  max_agent_context: 30000     # tokens, soft cap for sub-agents
  max_agent_output: 15000      # tokens

routing:
  # POC 6-phase pipeline (clarify → design → implement ⇄ review → test → accept)
  phases:
    - name: clarify
      agent: clarifier
      template: prompts-templates/clarifier.md
      criteria: prompts-criteria/criteria-clarify.md
    - name: design
      agent: designer
      template: prompts-templates/designer.md
      criteria: prompts-criteria/criteria-design.md
    - name: plan
      agent: planner
      template: prompts-templates/planner.md
      criteria: prompts-criteria/criteria-plan.md
      optional: true              # runs after design; may verdict "not_needed" and be skipped
    - name: implement
      agent: implementer
      mode: implement
      template: prompts-templates/implementer.md
      criteria: prompts-criteria/criteria-implement.md
    - name: test
      agent: tester
      template: prompts-templates/tester.md
      criteria: prompts-criteria/criteria-test.md
    - name: accept
      agent: acceptor
      template: prompts-templates/acceptor.md
      criteria: prompts-criteria/criteria-accept.md
    - name: validate
      agent: validator
      template: prompts-templates/validator.md

validator:
  enabled: true
  max_retries: 3

test:
  max_retries: 2              # test→implementer auto-retry cap (§5 gate logic)

hitl:
  enabled: true
  adapter: terminal-inline   # POC: only inline mode

concurrency:
  enabled: false             # POC: serial only (opt-in; see core §19)
  max_parallel_agents: 1     # upper bound across the workspace
  max_parallel_tasks: 1      # upper bound on distinct task_ids in flight
  per_role_limit:            # caps per agent role
    implementer: 1
    reviewer: 1
    validator: 1
  tick_interval_seconds: 0   # 0 = tick on every orchestrator turn; >0 reserved for future daemon mode
  stale_dispatch_minutes: 30 # dispatching items older than this are flagged (not auto-killed)

distillation:
  enabled: false             # POC: no auto-distill

dual_agent:
  enabled: true
  default_mode: "serial"        # "serial" | "parallel" | "off"
  max_iterations: 2
  escalate_on_fundamental: true
  reviewer_template: prompts-templates/reviewer.md
  review_criteria: prompts-criteria/criteria-review.md
  parallel:
    reviewer_a_focus: "correctness+security"
    reviewer_b_focus: "design+conventions"
    synthesizer_template: prompts-templates/synthesizer.md
    min_agreement_ratio: 0.5    # below this, escalate HITL regardless of verdict
