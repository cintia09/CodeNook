# CodeNook workspace configuration (v5.0 POC)
version: "5.0-poc"

# ─────────────────────────────────────────────────────────────────────────
# Model assignment
# ─────────────────────────────────────────────────────────────────────────
# Resolution precedence (highest first):
#   1. task.models[role]                — per-task override in tasks/<id>/state.json
#   2. workspace models[role]           — this file
#   3. workspace models.default         — workspace-wide fallback
#   4. "platform-default"               — sentinel: dispatch without --model,
#                                         let the platform pick (typically
#                                         general-purpose default; e.g.,
#                                         Claude Code → Sonnet 4.6).
#
# Subtasks (T-001.x) always inherit from their parent task; they never have
# their own models block and are never asked.
#
# Default below: claude-opus-4.7 for every role. Edit per role to taste.
# Init prompts once for the global default; you can rerun init in upgrade
# mode anytime — your config.yaml is preserved (new template lands at
# config.yaml.template for diff).
models:
  default: claude-opus-4.7
  clarifier: claude-opus-4.7
  designer: claude-opus-4.7
  planner: claude-opus-4.7
  implementer: claude-opus-4.7
  reviewer: claude-opus-4.7
  reviewer_a: claude-opus-4.7
  reviewer_b: claude-opus-4.7
  synthesizer: claude-opus-4.7
  tester: claude-opus-4.7
  acceptor: claude-opus-4.7
  validator: claude-opus-4.7
  session-distiller: claude-opus-4.7
  security-auditor: claude-opus-4.7
  # Tip for model diversity: set reviewer_a / reviewer_b to different
  # providers (e.g., claude-opus-4.7 vs gpt-5.4) for dual-review variance.

orchestrator:
  max_context_ratio_warn: 0.5
  max_context_ratio_alert: 0.8
  max_agent_context: 30000     # tokens, soft cap for sub-agents
  max_agent_output: 15000      # tokens

routing:
  # POC 6-phase pipeline (clarify → design → implement ⇄ review → test → accept)
  phases:
    - name: clarify
      agent: clarifier
      template: prompts-templates/clarifier.md
      criteria: prompts-criteria/criteria-clarify.md
    - name: design
      agent: designer
      template: prompts-templates/designer.md
      criteria: prompts-criteria/criteria-design.md
    - name: plan
      agent: planner
      template: prompts-templates/planner.md
      criteria: prompts-criteria/criteria-plan.md
      optional: true              # runs after design; may verdict "not_needed" and be skipped
    - name: implement
      agent: implementer
      mode: implement
      template: prompts-templates/implementer.md
      criteria: prompts-criteria/criteria-implement.md
    - name: test
      agent: tester
      template: prompts-templates/tester.md
      criteria: prompts-criteria/criteria-test.md
    - name: accept
      agent: acceptor
      template: prompts-templates/acceptor.md
      criteria: prompts-criteria/criteria-accept.md
    - name: validate
      agent: validator
      template: prompts-templates/validator.md

validator:
  enabled: true
  max_retries: 3

test:
  max_retries: 2              # test→implementer auto-retry cap (§5 gate logic)

hitl:
  enabled: true
  adapter: terminal-inline   # POC: only inline mode

concurrency:
  enabled: false             # POC: serial only (opt-in; see core §19)
  max_parallel_agents: 1     # upper bound across the workspace
  max_parallel_tasks: 1      # upper bound on distinct task_ids in flight
  per_role_limit:            # caps per agent role
    implementer: 1
    reviewer: 1
    validator: 1
  tick_interval_seconds: 0   # 0 = tick on every orchestrator turn; >0 reserved for future daemon mode
  stale_dispatch_minutes: 30 # dispatching items older than this are flagged (not auto-killed)

distillation:
  enabled: false             # POC: no auto-distill

dual_agent:
  enabled: true
  default_mode: "serial"        # "serial" | "parallel" | "off"
  max_iterations: 2
  escalate_on_fundamental: true
  reviewer_template: prompts-templates/reviewer.md
  review_criteria: prompts-criteria/criteria-review.md
  parallel:
    reviewer_a_focus: "correctness+security"
    reviewer_b_focus: "design+conventions"
    synthesizer_template: prompts-templates/synthesizer.md
    min_agreement_ratio: 0.5    # below this, escalate HITL regardless of verdict

# ─────────────────────────────────────────────────────────────────────────
# Phase entry questions (Friction §3.1)
# ─────────────────────────────────────────────────────────────────────────
# Mechanically queryable list of fields that MUST be answered (non-null in
# the task's state.json) BEFORE the orchestrator may transition the task
# INTO each phase. The orchestration loop calls this at every phase
# transition; if any listed field is null/missing the transition is
# blocked and the task is surfaced to HITL.
#
# This is a stricter, phase-keyed superset of OPT-7's creation-time
# preflight (core §22.3). Phases without entry questions use [].
#
# Allowed answer values:
#   dual_mode:     "serial" | "parallel" | "off"
#   max_iterations: int >= 1 (>= 2 if dual_mode == "serial"; see preflight 7b)
phase_entry_questions:
  clarify:
    - dual_mode               # captured at task creation; needed before any phase work
  design:    []
  plan:      []
  implement:
    - dual_mode
    - max_iterations          # required for serial/parallel loops
  review:    []
  validate:  []
  ship:      []
