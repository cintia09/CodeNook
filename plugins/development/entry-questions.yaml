# plugins/development/entry-questions.yaml
# Phase-keyed map of state.json fields that MUST be non-null/non-empty
# before the orchestrator may transition INTO the phase.
#
# Consumed by orchestrator-tick.check_entry_questions(). Missing fields
# produce status=blocked + a "Please answer first: ..." message.
#
# Derived from v5 codenook-core.md §22.7 (Phase Entry Questions Stanza)
# with the following v6 pins:
#   * `dual_mode` is required at clarify so the very first dispatch
#     already knows serial vs. parallel posture.
#   * `target_dir` is required at implement so the role knows where to
#     write code.
#   * `max_iterations` is required at implement so the iteration cap is
#     explicit (not silently 0).

clarify:
  required:
    - dual_mode

design:
  required: []

plan:
  required: []

implement:
  required:
    - dual_mode
    - max_iterations
    - target_dir

test:
  required: []

accept:
  required: []

validate:
  required: []

ship:
  required: []
