# plugins/writing/phases.yaml
# 5-phase long-form authoring pipeline.
#
# Pinned (per M7 task prompt): outline -> draft -> review -> revise -> publish
# with roles outliner/drafter/reviewer/reviser/publisher.
#
# Divergences from impl-v6 §M7.2 (L869-875):
#   * Spec lists `edit` as the third phase (we use `review` + `revise`
#     as two separate phases for a tighter feedback loop).
#   * Spec sets `publish.role: null` + `gate: pre_publish` on the
#     publish phase. We set the gate on `revise` instead (semantically
#     correct: pause for the human BEFORE the publisher writes anything
#     to disk, not after) and add a real `publisher` role so
#     orchestrator-tick has something to dispatch and the E2E mock can
#     drive the task to `complete`. Practical bonus: this also avoids a
#     pre-existing M4 _tick.py persist quirk where a "done" tick is
#     suppressed when the previous tick left the task in `waiting`
#     status.

phases:
  - id: outline
    role: outliner
    produces: outputs/phase-1-outliner.md

  - id: draft
    role: drafter
    produces: outputs/phase-2-drafter.md
    supports_iteration: true
    dual_mode_compatible: true
    post_validate: validators/post-draft.py

  - id: review
    role: reviewer
    produces: outputs/phase-3-reviewer.md

  - id: revise
    role: reviser
    produces: outputs/phase-4-reviser.md
    supports_iteration: true
    gate: pre_publish

  - id: publish
    role: publisher
    produces: outputs/phase-5-publisher.md
