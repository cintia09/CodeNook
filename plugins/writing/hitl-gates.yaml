# plugins/writing/hitl-gates.yaml
# HITL gate catalogue for the writing plugin.

gates:
  pre_publish:
    trigger: revise
    required_reviewers: [human]
    description: >
      Final human approval after the reviser produces the publish-ready
      article and BEFORE the publisher writes it to disk. Editorial
      judgement (tone, claims, brand voice) is not safely automatable,
      so the writing pipeline always pauses here.
