<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-violet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#059669"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#ffffff"/>

  <!-- Title -->
  <text x="640" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">CodeNook v0.14.0 — three-layer architecture</text>
  <text x="640" y="66" text-anchor="middle" font-size="13" fill="#64748b">conductor (Claude Code / Copilot CLI) → kernel CLI → plugin + workspace state</text>

  <!-- ========== LAYER 1: Main session (conductor) ========== -->
  <rect x="30" y="100" width="290" height="540" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="175" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">LAYER 1 — Main session</text>
  <text x="175" y="146" text-anchor="middle" font-size="11" fill="#1d4ed8">Pure protocol conductor</text>

  <rect x="55" y="170" width="240" height="80" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="175" y="195" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">Claude Code / Copilot CLI</text>
  <text x="175" y="214" text-anchor="middle" font-size="11" fill="#475569">reads CLAUDE.md bootloader</text>
  <text x="175" y="232" text-anchor="middle" font-size="11" fill="#475569">never interprets domain output</text>

  <rect x="55" y="280" width="240" height="120" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="175" y="305" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">4-step protocol</text>
  <text x="70" y="328" font-size="11" fill="#334155">1. classify user turn</text>
  <text x="70" y="346" font-size="11" fill="#334155">2. invoke <tspan font-family="monospace" fill="#0f172a">codenook tick</tspan></text>
  <text x="70" y="364" font-size="11" fill="#334155">3. relay HITL gates verbatim</text>
  <text x="70" y="382" font-size="11" fill="#334155">4. loop until done | blocked</text>

  <rect x="55" y="430" width="240" height="80" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="175" y="455" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">Context-pressure path</text>
  <text x="175" y="475" text-anchor="middle" font-size="11" fill="#475569">@ 80% watermark →</text>
  <text x="175" y="492" text-anchor="middle" font-family="monospace" font-size="10.5" fill="#0f172a">extractor-batch --reason context-pressure</text>

  <text x="175" y="555" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">user ↔ conductor</text>
  <text x="175" y="572" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">"use codenook to …"</text>
  <text x="175" y="610" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">"approve" / "needs_changes"</text>

  <!-- ========== LAYER 2: Kernel ========== -->
  <rect x="345" y="100" width="320" height="540" rx="14" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="505" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6">LAYER 2 — CodeNook CLI + Kernel</text>
  <text x="505" y="146" text-anchor="middle" font-size="11" fill="#6d28d9">codenook-core/ · plugin-agnostic</text>

  <!-- CLI surface -->
  <rect x="365" y="170" width="280" height="90" rx="10" fill="#ffffff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="505" y="192" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">CLI surface (bin/codenook)</text>
  <text x="505" y="213" text-anchor="middle" font-family="monospace" font-size="11" fill="#0f172a">codenook tick   --task T --json</text>
  <text x="505" y="230" text-anchor="middle" font-family="monospace" font-size="11" fill="#0f172a">codenook decide --task T --phase P</text>
  <text x="505" y="247" text-anchor="middle" font-family="monospace" font-size="11" fill="#0f172a">codenook hitl   list|show|render</text>

  <!-- orchestrator-tick -->
  <rect x="365" y="285" width="280" height="120" rx="10" fill="#ffffff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="505" y="307" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">orchestrator-tick (state machine)</text>
  <text x="380" y="328" font-size="11" fill="#334155">load phase → render manifest →</text>
  <text x="380" y="345" font-size="11" fill="#334155">dispatch sub-agent → consume verdict →</text>
  <text x="380" y="362" font-size="11" fill="#334155">post_validate → fire extractors →</text>
  <text x="380" y="379" font-size="11" fill="#334155">open HITL gate → advance per profile</text>
  <text x="505" y="397" text-anchor="middle" font-size="10.5" fill="#7c3aed" font-style="italic">status ∈ {advanced, waiting, done, blocked}</text>

  <!-- HITL adapter -->
  <rect x="365" y="425" width="135" height="80" rx="10" fill="#ffffff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="432.5" y="447" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">hitl-adapter</text>
  <text x="432.5" y="467" text-anchor="middle" font-size="10.5" fill="#475569">terminal + html</text>
  <text x="432.5" y="484" text-anchor="middle" font-size="10.5" fill="#475569">channels</text>

  <!-- Extractors -->
  <rect x="510" y="425" width="135" height="80" rx="10" fill="#ffffff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="577.5" y="447" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">extractor-batch</text>
  <text x="577.5" y="465" text-anchor="middle" font-size="10" fill="#475569">skill · knowledge ·</text>
  <text x="577.5" y="481" text-anchor="middle" font-size="10" fill="#475569">config extractors</text>
  <text x="577.5" y="497" text-anchor="middle" font-size="10" fill="#475569">→ memory/</text>

  <!-- Other builtins -->
  <rect x="365" y="525" width="280" height="95" rx="10" fill="#ffffff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="505" y="547" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">other builtin skills</text>
  <text x="380" y="567" font-size="10.5" fill="#475569">preflight · skill-resolve · sec-audit</text>
  <text x="380" y="584" font-size="10.5" fill="#475569">install-orchestrator + 12-gate plugin install</text>
  <text x="380" y="601" font-size="10.5" fill="#475569">config-resolve · model-probe · secrets-resolve</text>
  <text x="380" y="615" font-size="9.5" fill="#94a3b8" font-style="italic">router-agent: deprecated · scheduled for removal</text>

  <!-- ========== LAYER 3: Plugin + Workspace ========== -->
  <rect x="690" y="100" width="560" height="540" rx="14" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="970" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">LAYER 3 — Plugin + Workspace state</text>
  <text x="970" y="146" text-anchor="middle" font-size="11" fill="#047857">domain knowledge · per-task / cross-task data</text>

  <!-- Plugin -->
  <rect x="710" y="170" width="245" height="285" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
  <text x="832.5" y="192" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">plugins/&lt;id&gt;/  (read-only)</text>
  <text x="832.5" y="208" text-anchor="middle" font-size="10.5" fill="#047857" font-style="italic">development v0.2.0 · writing · generic</text>

  <line x1="725" y1="220" x2="940" y2="220" stroke="#a7f3d0" stroke-width="1"/>

  <text x="725" y="240" font-family="monospace" font-size="11" fill="#0f172a">plugin.yaml</text>
  <text x="855" y="240" font-size="10.5" fill="#475569">identity + routing</text>

  <text x="725" y="260" font-family="monospace" font-size="11" fill="#0f172a">phases.yaml</text>
  <text x="855" y="260" font-size="10.5" fill="#475569">catalogue + profiles</text>

  <text x="725" y="280" font-family="monospace" font-size="11" fill="#0f172a">hitl-gates.yaml</text>
  <text x="855" y="280" font-size="10.5" fill="#475569">10 gates (dev)</text>

  <text x="725" y="300" font-family="monospace" font-size="11" fill="#0f172a">roles/&lt;role&gt;.md</text>
  <text x="855" y="300" font-size="10.5" fill="#475569">10 roles (dev)</text>

  <text x="725" y="320" font-family="monospace" font-size="11" fill="#0f172a">manifest-templates/</text>

  <text x="725" y="340" font-family="monospace" font-size="11" fill="#0f172a">knowledge/</text>
  <text x="855" y="340" font-size="10.5" fill="#475569">shipped facts</text>

  <text x="725" y="360" font-family="monospace" font-size="11" fill="#0f172a">skills/</text>
  <text x="855" y="360" font-size="10.5" fill="#475569">e.g. test-runner</text>

  <text x="725" y="380" font-family="monospace" font-size="11" fill="#0f172a">validators/</text>
  <text x="855" y="380" font-size="10.5" fill="#475569">post_validate hooks</text>

  <line x1="725" y1="400" x2="940" y2="400" stroke="#a7f3d0" stroke-width="1"/>

  <text x="832.5" y="420" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">development feature profile</text>
  <text x="832.5" y="437" text-anchor="middle" font-size="9.5" fill="#475569">clarify→design→plan→implement→build→</text>
  <text x="832.5" y="450" text-anchor="middle" font-size="9.5" fill="#475569">review→submit→test-plan→test→accept→ship</text>

  <!-- Workspace state -->
  <rect x="970" y="170" width="265" height="285" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
  <text x="1102.5" y="192" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">tasks/&lt;T-NNN&gt;/</text>

  <text x="985" y="215" font-family="monospace" font-size="11" fill="#0f172a">state.json</text>
  <text x="1102" y="215" font-size="10" fill="#475569">phase, profile, status</text>

  <text x="985" y="234" font-family="monospace" font-size="11" fill="#0f172a">prompts/</text>
  <text x="1102" y="234" font-size="10" fill="#475569">rendered manifests</text>

  <text x="985" y="253" font-family="monospace" font-size="11" fill="#0f172a">outputs/</text>
  <text x="1102" y="253" font-size="10" fill="#475569">verdict-stamped</text>

  <text x="985" y="272" font-family="monospace" font-size="11" fill="#0f172a">audit/</text>
  <text x="1102" y="272" font-size="10" fill="#475569">dispatch.jsonl</text>

  <line x1="985" y1="285" x2="1220" y2="285" stroke="#a7f3d0" stroke-width="1"/>

  <text x="1102.5" y="305" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">memory/  (cross-task)</text>
  <text x="985" y="325" font-family="monospace" font-size="11" fill="#0f172a">skills/&lt;name&gt;/</text>
  <text x="1102" y="325" font-size="10" fill="#475569">SKILL.md</text>
  <text x="985" y="344" font-family="monospace" font-size="11" fill="#0f172a">knowledge/</text>
  <text x="1102" y="344" font-size="10" fill="#475569">topic markdown</text>
  <text x="985" y="363" font-family="monospace" font-size="11" fill="#0f172a">configs/</text>
  <text x="985" y="382" font-family="monospace" font-size="11" fill="#0f172a">index.yaml</text>
  <text x="1102" y="382" font-size="10" fill="#475569">human-readable</text>

  <line x1="985" y1="395" x2="1220" y2="395" stroke="#a7f3d0" stroke-width="1"/>

  <text x="1102.5" y="415" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">hitl-queue/</text>
  <text x="1102.5" y="432" text-anchor="middle" font-size="10.5" fill="#475569">&lt;task&gt;-&lt;gate&gt;.json</text>
  <text x="1102.5" y="447" text-anchor="middle" font-size="10" fill="#475569">+ extraction-log.jsonl</text>

  <!-- 11-phase row -->
  <rect x="710" y="475" width="525" height="55" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="1"/>
  <text x="972.5" y="495" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">phases (catalogue) — every phase except `implement` has a HITL gate</text>
  <text x="972.5" y="515" text-anchor="middle" font-family="monospace" font-size="10" fill="#0f172a">clarify · design · plan · implement · build · review · submit · test-plan · test · accept · ship</text>

  <!-- Profiles row -->
  <rect x="710" y="545" width="525" height="80" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="1"/>
  <text x="972.5" y="565" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">7 profiles · clarifier picks task_type → tick walks the chain</text>
  <text x="725" y="585" font-size="10" fill="#334155">feature 11 ·  refactor 9 ·  hotfix 7 ·  test-only 4</text>
  <text x="725" y="602" font-size="10" fill="#334155">docs 4    ·  design 3   ·  review 3</text>
  <text x="725" y="618" font-size="9.5" fill="#64748b" font-style="italic">profile cached in state.profile after first dispatch</text>

  <!-- ========== ARROWS ========== -->
  <!-- Conductor → CLI -->
  <line x1="295" y1="320" x2="365" y2="320" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <text x="330" y="313" text-anchor="middle" font-size="9.5" fill="#1d4ed8">invoke</text>

  <!-- CLI envelope back -->
  <line x1="365" y1="345" x2="295" y2="345" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="330" y="362" text-anchor="middle" font-size="9.5" fill="#475569">JSON status</text>

  <!-- orchestrator-tick → plugin (read role/manifest) -->
  <line x1="645" y1="335" x2="710" y2="280" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-violet)"/>
  <text x="676" y="298" font-size="9.5" fill="#7c3aed">read role</text>

  <!-- orchestrator-tick → tasks/ (write manifest+output, mutate state) -->
  <line x1="645" y1="365" x2="970" y2="240" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-violet)"/>
  <text x="800" y="298" font-size="9.5" fill="#7c3aed">dispatch sub-agent · write outputs · mutate state.json</text>

  <!-- hitl-adapter → hitl-queue -->
  <line x1="500" y1="465" x2="970" y2="425" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-violet)"/>
  <text x="730" y="450" font-size="9.5" fill="#7c3aed">raise gate entry</text>

  <!-- extractors → memory -->
  <line x1="645" y1="465" x2="970" y2="345" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="780" y="412" font-size="9.5" fill="#059669">extract → memory · index.yaml regen · audit log</text>

  <!-- ========== Legend ========== -->
  <rect x="30" y="660" width="1220" height="46" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="48" y="680" font-size="11" font-weight="600" fill="#0f172a">Legend</text>
  <line x1="110" y1="676" x2="148" y2="676" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <text x="155" y="680" font-size="11" fill="#1e3a8a">conductor → CLI</text>
  <line x1="288" y1="676" x2="326" y2="676" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="333" y="680" font-size="11" fill="#334155">JSON envelope back</text>
  <line x1="490" y1="676" x2="528" y2="676" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-violet)"/>
  <text x="535" y="680" font-size="11" fill="#5b21b6">kernel → plugin / tasks / queue</text>
  <line x1="765" y1="676" x2="803" y2="676" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="810" y="680" font-size="11" fill="#065f46">extractor → memory</text>
  <text x="48" y="698" font-size="10" fill="#64748b">Style: flat icon · white background · all state is plain JSON / YAML / Markdown — resumable, auditable, diff-able.</text>
</svg>
